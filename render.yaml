services:
  - type: web
    name: opc-game-server
    runtime: node
    plan: free
    repo: https://github.com/Wen-Si/opc-game
    branch: main
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
